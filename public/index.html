<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MoodBoard — Anonymous campus feedback board. Share your thoughts about courses, facilities, and more." />
  <title>MoodBoard — Campus Feedback</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== FLOATING BLOBS (ambient BG) ===== -->
  <div class="ambient-bg" aria-hidden="true">
    <div class="blob blob--1"></div>
    <div class="blob blob--2"></div>
    <div class="blob blob--3"></div>
  </div>

  <!-- ===== HEADER ===== -->
  <header class="hero" id="hero">
    <div class="hero__inner">
      <div class="hero__logo">
        <span class="hero__icon">💬</span>
        <h1>MoodBoard</h1>
      </div>
      <p class="hero__tagline">Anonymous campus feedback — speak your mind freely.</p>
      <div class="hero__stats" id="hero-stats">
        <div class="stat-pill"><i class="ph ph-chat-circle-dots"></i> <span id="stat-posts">0</span> Posts</div>
        <div class="stat-pill"><i class="ph ph-arrow-fat-up"></i> <span id="stat-upvotes">0</span> Upvotes</div>
        <div class="stat-pill"><i class="ph ph-users"></i> Anonymous</div>
      </div>
    </div>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle dark/light theme">
      <i class="ph ph-moon" id="theme-icon"></i>
    </button>
  </header>

  <main class="container">

    <!-- ===== NEW POST FORM ===== -->
    <section class="card card--form glass" id="post-form-section">
      <h2 class="section-title"><i class="ph ph-pencil-simple-line"></i> Share Your Thoughts</h2>
      <form id="post-form" autocomplete="off">
        <div class="textarea-wrap">
          <textarea
            id="message-input"
            placeholder="What's on your mind? Course feedback, facility issues, general vibes…"
            rows="3"
            maxlength="500"
            required
          ></textarea>
          <span class="char-count"><span id="char-used">0</span> / 500</span>
        </div>

        <div class="form-row">
          <div class="mood-selector" id="mood-selector">
            <span class="mood-label">Mood:</span>
            <button type="button" class="mood-btn" data-mood="😊" title="Happy">😊</button>
            <button type="button" class="mood-btn" data-mood="😤" title="Frustrated">😤</button>
            <button type="button" class="mood-btn" data-mood="💡" title="Idea">💡</button>
            <button type="button" class="mood-btn" data-mood="❤️" title="Love">❤️</button>
            <button type="button" class="mood-btn" data-mood="😐" title="Neutral">😐</button>
          </div>
        </div>

        <div class="form-row">
          <div class="select-wrapper">
            <select id="category-select">
              <option value="General">🌐 General</option>
              <option value="Course">📚 Course</option>
              <option value="Facility">🏢 Facility</option>
              <option value="Food">🍔 Food</option>
              <option value="Events">🎉 Events</option>
            </select>
          </div>

          <button type="submit" id="submit-btn" class="btn-primary">
            <span class="btn-label">Post Anonymously</span>
            <i class="ph ph-paper-plane-tilt"></i>
          </button>
        </div>
      </form>
    </section>

    <!-- ===== TOOLBAR ===== -->
    <section class="toolbar" id="toolbar">
      <div class="search-bar">
        <i class="ph ph-magnifying-glass"></i>
        <input type="text" id="search-input" placeholder="Search posts…" />
      </div>
      <div class="toolbar__actions">
        <div class="category-tabs" id="category-tabs">
          <button class="tab active" data-cat="All">All</button>
          <button class="tab" data-cat="General">🌐</button>
          <button class="tab" data-cat="Course">📚</button>
          <button class="tab" data-cat="Facility">🏢</button>
          <button class="tab" data-cat="Food">🍔</button>
          <button class="tab" data-cat="Events">🎉</button>
        </div>
        <div class="sort-toggle" id="sort-toggle">
          <button class="sort-btn active" data-sort="hot" title="Trending"><i class="ph ph-fire"></i></button>
          <button class="sort-btn" data-sort="new" title="Newest"><i class="ph ph-clock"></i></button>
        </div>
      </div>
    </section>

    <!-- ===== POSTS FEED ===== -->
    <section id="feed" class="feed">
      <div class="feed__header">
        <h2 class="section-title"><i class="ph ph-rss"></i> Campus Feed</h2>
        <span class="post-count" id="post-count">0 posts</span>
      </div>

      <div id="posts-container" class="posts-container">
        <!-- Posts rendered via JS -->
      </div>

      <div id="empty-state" class="empty-state" hidden>
        <span class="empty-state__icon">🫧</span>
        <p>No posts yet — be the first to share!</p>
      </div>

      <div id="loading-state" class="loading-state">
        <div class="spinner"></div>
        <p>Loading posts…</p>
      </div>
    </section>
  </main>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- ===== LIVE INDICATOR ===== -->
  <div class="live-indicator" id="live-indicator" title="Auto-refreshing">
    <span class="live-dot"></span>
    <span>LIVE</span>
  </div>

  <footer class="footer">
    <p>MoodBoard &copy; 2026 — All feedback is 100% anonymous. <span class="footer-heart">❤️</span></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
